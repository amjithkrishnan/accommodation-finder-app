server.port=8080
spring.application.name=webapp
serviceapp.url=${SERVICE_APP_URL:http://localhost:8081}
serviceapp.auth.url=${serviceapp.url}/api/auth
serviceapp.secret=${INTERNAL_SECRET:your-strong-secret-key-change-in-production}
spring.web.resources.static-locations=classpath:/static/react-app/

# File Upload Configuration
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}
