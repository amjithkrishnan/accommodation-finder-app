server.port=8081
spring.application.name=serviceapp

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/accommodationapp?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Spring Session Configuration
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=2592000

# Session Cookie Configuration (30 days persistence)
server.servlet.session.cookie.max-age=2592000
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.domain=localhost
server.servlet.session.cookie.path=/
# For production, enable: server.servlet.session.cookie.secure=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# AWS S3 Configuration
app.storage.mode=local
aws.s3.bucket-name=accommodateme-media
aws.s3.region=eu-west-1
# Set these as environment variables for security:
# AWS_ACCESS_KEY_ID=your-access-key
# AWS_SECRET_ACCESS_KEY=your-secret-key

# Internal Security
serviceapp.internal.secret=your-strong-secret-key-change-in-production
