server.port=8081
spring.application.name=serviceapp

# Database - sensitive values from environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/accommodationapp?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA/Hibernate - non-sensitive
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Spring Session - non-sensitive
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=${SESSION_TIMEOUT:2592000}

# Session Cookie - non-sensitive
server.servlet.session.cookie.max-age=${COOKIE_MAX_AGE:2592000}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.domain=${COOKIE_DOMAIN:localhost}
server.servlet.session.cookie.path=/
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

# File Upload - non-sensitive
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}

# Storage - mode is non-sensitive, credentials from env
app.storage.mode=${STORAGE_MODE:local}
app.storage.local.path=./uploads
aws.s3.bucket-name=${S3_BUCKET_NAME:accommodateme-media}
aws.s3.region=${AWS_REGION:us-east-1}

# Sensitive - from environment variables only
serviceapp.internal.secret=${INTERNAL_SECRET:your-strong-secret-key-change-in-production}
app.encryption.key=${APP_ENCRYPTION_KEY:2ZZkDYYBQKO8KbQYYqsTCXF50mVg4J5bn+kfXleLmLY=}
