server.port=8081
spring.application.name=serviceapp

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/accommodationapp?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Spring Session
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=2592000

# Session Cookie
server.servlet.session.cookie.max-age=2592000
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.path=/
server.servlet.session.cookie.secure=false

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# Storage
app.storage.mode=local
app.storage.local.path=./uploads
aws.s3.bucket-name=accommodateme-media
aws.s3.region=eu-west-1

# Sensitive
serviceapp.internal.secret=${INTERNAL_SECRET:your-strong-secret-key-change-in-production}
app.encryption.key=${APP_ENCRYPTION_KEY:2ZZkDYYBQKO8KbQYYqsTCXF50mVg4J5bn+kfXleLmLY=}
