server.port=8081
spring.application.name=serviceapp

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Spring Session
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=2592000

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# Storage
app.storage.mode=s3
aws.s3.bucket-name=${S3_BUCKET_NAME}
aws.s3.region=${AWS_REGION:eu-west-1}

# Sensitive
serviceapp.internal.secret=${INTERNAL_SECRET}
app.encryption.key=${APP_ENCRYPTION_KEY}
