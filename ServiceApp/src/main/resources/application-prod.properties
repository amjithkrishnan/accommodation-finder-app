server.port=8081
spring.application.name=serviceapp

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/accommodationapp?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:org.mariadb.jdbc.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MariaDBDialect}
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Spring Session Configuration
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=${SESSION_TIMEOUT:2592000}

# Session Cookie Configuration
server.servlet.session.cookie.max-age=${COOKIE_MAX_AGE:2592000}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.path=/
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

# File Upload Configuration
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}

# AWS S3 Configuration
app.storage.mode=${STORAGE_MODE:s3}
aws.s3.bucket-name=${S3_BUCKET_NAME:accommodateme-media}
aws.s3.region=${AWS_REGION:eu-west-1}

# Internal Security
serviceapp.internal.secret=${INTERNAL_SECRET:change-me}