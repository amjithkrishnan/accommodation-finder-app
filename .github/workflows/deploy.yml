name: Build, Security Scan & Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup Java 21
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: maven

    # Build WebApp
    - name: Build WebApp
      run: |
        cd WebApp
        mvn clean package -DskipTests

    # Build ServiceApp
    - name: Build ServiceApp
      run: |
        cd ServiceApp
        mvn clean package -DskipTests

    # OWASP Dependency Check (STABLE CLI VERSION)
    - name: Install OWASP Dependency Check
      run: |
        wget https://github.com/jeremylong/DependencyCheck/releases/latest/download/dependency-check.zip
        unzip dependency-check.zip

    - name: Run OWASP Scan
      run: |
        ./dependency-check/bin/dependency-check.sh \
          --project "MyProject" \
          --scan . \
          --format HTML \
          --out reports

    # Fail pipeline on critical vulnerabilities
    - name: Check Vulnerabilities
      run: |
        if grep -q "CRITICAL" reports/dependency-check-report.html; then
          echo "Critical vulnerabilities found!"
          exit 1
        fi

    # Upload artifacts
    - name: Upload JARs
      uses: actions/upload-artifact@v4
      with:
        name: jars
        path: |
          WebApp/target/*.jar
          ServiceApp/target/*.jar

  deploy:
    needs: build-and-scan
    runs-on: ubuntu-latest

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: jars

    # Copy JARs to Bastion
    - name: Copy JARs to Bastion
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ${{ secrets.BASTION_USER }}
        key: ${{ secrets.BASTION_SSH_KEY }}
        source: "*.jar"
        target: "/home/ubuntu/"

    # Deploy from Bastion to EC2
    - name: Deploy to EC2 via Bastion
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ${{ secrets.BASTION_USER }}
        key: ${{ secrets.BASTION_SSH_KEY }}
        script: |

          echo "Deploying WebApp-1"
          scp -i /home/ubuntu/cpp-project.pem webapp*.jar ubuntu@${{ secrets.WEBAPP1_IP }}:/home/ubuntu/webapp.jar

          echo "Deploying WebApp-2"
          scp -i /home/ubuntu/cpp-project.pem webapp*.jar ubuntu@${{ secrets.WEBAPP2_IP }}:/home/ubuntu/webapp.jar

          echo "Deploying ServiceApp"
          scp -i /home/ubuntu/cpp-project.pem serviceapp*.jar ubuntu@${{ secrets.SERVICEAPP_IP }}:/home/ubuntu/serviceapp.jar

          echo "Restart WebApps"
          ssh -i /home/ubuntu/cpp-project.pem ubuntu@${{ secrets.WEBAPP1_IP }} "sudo systemctl restart webapp"
          ssh -i /home/ubuntu/cpp-project.pem ubuntu@${{ secrets.WEBAPP2_IP }} "sudo systemctl restart webapp"

          echo "Restart ServiceApp"
          ssh -i /home/ubuntu/cpp-project.pem ubuntu@${{ secrets.SERVICEAPP_IP }} "sudo systemctl restart serviceapp"

          echo "Deployment Successful"