name: CI-CD Pipeline (Fast OWASP Mode)

on:
  push:
    branches:
      - master

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------
    # 1. Checkout Code
    # ----------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # ----------------------------
    # 2. Setup Java 21
    # ----------------------------
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21
        cache: maven

    # ----------------------------
    # 3. Build Project
    # ----------------------------
    - name: Build WebApp & ServiceApp
      run: |
        mvn -v
        cd WebApp && mvn clean package -DskipTests
        cd ../ServiceApp && mvn clean package -DskipTests

    # ----------------------------
    # 4. OWASP Dependency Check (Maven, Cached NVD)
    # ----------------------------
    - name: Get date for cache key
      id: date
      run: echo "date=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

    - name: Restore NVD Database Cache
      id: nvd-cache
      uses: actions/cache/restore@v4
      with:
        path: ~/.dependency-check/data
        key: nvd-${{ runner.os }}-${{ steps.date.outputs.date }}
        restore-keys: nvd-${{ runner.os }}-

    - name: OWASP Dependency Check
      run: |
        COMMON_OPTS="-DnvdApiKey=${{ secrets.NVD_API_KEY }} -DfailBuildOnCVSS=7 -Dformat=HTML -DdataDirectory=$HOME/.dependency-check/data -DsuppressionsFile=${{ github.workspace }}/owasp-suppressions.xml -DassemblyAnalyzerEnabled=false -DnodeAnalyzerEnabled=false -DyarnAuditAnalyzerEnabled=false"
        mvn org.owasp:dependency-check-maven:check $COMMON_OPTS -f WebApp/pom.xml
        mvn org.owasp:dependency-check-maven:check $COMMON_OPTS -f ServiceApp/pom.xml

    - name: Save NVD Database Cache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: ~/.dependency-check/data
        key: nvd-${{ runner.os }}-${{ steps.date.outputs.date }}


  

    # ----------------------------
    # 5. Security Gate
    # ----------------------------
    - name: Security Gate
      run: |
        FAILED=0
        for report in WebApp/target/dependency-check-report.html ServiceApp/target/dependency-check-report.html; do
          if [ -f "$report" ]; then
            if grep -q "CRITICAL" "$report"; then
              echo "CRITICAL vulnerabilities found in $report"
              FAILED=1
            else
              echo "No CRITICAL vulnerabilities in $report"
            fi
          else
            echo "Report not found: $report"
            FAILED=1
          fi
        done
        exit $FAILED

    # ----------------------------
    # 6. Upload Artifacts (v4)
    # ----------------------------
    - name: Upload JARs
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          WebApp/target/*.jar
          ServiceApp/target/*.jar
          WebApp/target/dependency-check-report.html
          ServiceApp/target/dependency-check-report.html

  deploy:
    needs: build-and-scan
    runs-on: ubuntu-latest

    steps:
    # ----------------------------
    # 7. Download Artifacts
    # ----------------------------
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: Collect JARs
      run: |
        mkdir -p deploy
        cp WebApp/target/*.jar deploy/
        cp ServiceApp/target/*.jar deploy/

    # ----------------------------
    # 8. Copy to Bastion
    # ----------------------------
    - name: Copy to Bastion
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ubuntu
        key: ${{ secrets.BASTION_SSH_KEY }}
        source: "deploy/*.jar"
        target: "/home/ubuntu/"
        strip_components: 1

    # ----------------------------
    # 9. Deploy via Bastion
    # ----------------------------
    - name: Deploy via Bastion
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ubuntu
        key: ${{ secrets.BASTION_SSH_KEY }}
        script: |
          scp -i ~/cpp-project.pem webapp*.jar ubuntu@${{ secrets.WEBAPP1_IP }}:/opt/webapp/webapp.jar
          scp -i ~/cpp-project.pem webapp*.jar ubuntu@${{ secrets.WEBAPP2_IP }}:/opt/webapp/webapp.jar
          scp -i ~/cpp-project.pem serviceapp*.jar ubuntu@${{ secrets.SERVICEAPP_IP }}:/opt/serviceapp/serviceapp.jar

          ssh -i ~/cpp-project.pem ubuntu@${{ secrets.WEBAPP1_IP }} "sudo systemctl restart webapp"
          ssh -i ~/cpp-project.pem ubuntu@${{ secrets.WEBAPP2_IP }} "sudo systemctl restart webapp"
          ssh -i ~/cpp-project.pem ubuntu@${{ secrets.SERVICEAPP_IP }} "sudo systemctl restart serviceapp"

          echo "✅ Deployment Completed"