name: Build, Scan & Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 🔧 Setup Java
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # Build WebApp
    - name: Build WebApp
      run: |
        cd webapp
        mvn clean package -DskipTests

    # Build ServiceApp
    - name: Build ServiceApp
      run: |
        cd serviceapp
        mvn clean package -DskipTests

    # 🛡️ OWASP Dependency Check
    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "MyProject"
        path: "."
        format: "HTML"
        out: "reports"

    # Fail if critical vulnerabilities
    - name: Check vulnerabilities
      run: |
        if grep -q "CRITICAL" reports/dependency-check-report.html; then
          echo "Critical vulnerabilities found!"
          exit 1
        fi

    # 📦 Upload JARs
    - name: Upload JARs
      uses: actions/upload-artifact@v4
      with:
        name: jars
        path: |
          webapp/target/*.jar
          serviceapp/target/*.jar

  deploy:
    needs: build-and-scan
    runs-on: ubuntu-latest

    steps:
    - name: Download JARs
      uses: actions/download-artifact@v4
      with:
        name: jars

    # Copy JARs to Bastion
    - name: Copy JARs to Bastion
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ${{ secrets.BASTION_USER }}
        key: ${{ secrets.BASTION_SSH_KEY }}
        source: "jars/*.jar"
        target: "/home/ubuntu/"

    # Deploy via Bastion
    - name: Deploy to EC2 via Bastion
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ${{ secrets.BASTION_USER }}
        key: ${{ secrets.BASTION_SSH_KEY }}
        script: |

          echo "📦 Deploying WebApp to WebApp-1"
          scp -i /home/ubuntu/cpp-project.pem -o StrictHostKeyChecking=no webapp*.jar ubuntu@${{ secrets.WEBAPP1_IP }}:/home/ubuntu/webapp.jar

          echo "📦 Deploying WebApp to WebApp-2"
          scp -i /home/ubuntu/cpp-project.pem -o StrictHostKeyChecking=no webapp*.jar ubuntu@${{ secrets.WEBAPP2_IP }}:/home/ubuntu/webapp.jar

          echo "📦 Deploying ServiceApp"
          scp -i /home/ubuntu/cpp-project.pem -o StrictHostKeyChecking=no serviceapp*.jar ubuntu@${{ secrets.SERVICEAPP_IP }}:/home/ubuntu/serviceapp.jar

          echo "🔄 Restarting WebApp-1"
          ssh -i /home/ubuntu/cpp-project.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.WEBAPP1_IP }} "sudo systemctl restart webapp"

          echo "🔄 Restarting WebApp-2"
          ssh -i /home/ubuntu/cpp-project.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.WEBAPP2_IP }} "sudo systemctl restart webapp"

          echo "🔄 Restarting ServiceApp"
          ssh -i /home/ubuntu/cpp-project.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.SERVICEAPP_IP }} "sudo systemctl restart serviceapp"

          echo "✅ Deployment Successful"