name: CI-CD Pipeline (Fast OWASP Mode)

on:
  push:
    branches:
      - master

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------
    # 1. Checkout Code
    # ----------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # ----------------------------
    # 2. Setup Java 21
    # ----------------------------
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21
        cache: maven

    # ----------------------------
    # 3. Build Project
    # ----------------------------
    - name: Build WebApp & ServiceApp
      run: |
        mvn -v
        cd WebApp && mvn clean package -DskipTests
        cd ../ServiceApp && mvn clean package -DskipTests

    # ----------------------------
    # 4. OWASP Dependency Check (Maven, Cached NVD)
    # ----------------------------
    - name: Cache NVD Database
      uses: actions/cache@v4
      with:
        path: ~/.dependency-check/data
        key: nvd-${{ runner.os }}-${{ steps.date.outputs.date }}
        restore-keys: nvd-${{ runner.os }}-

    - name: Get date for cache key
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: OWASP Dependency Check
      run: |
        mkdir -p reports
        COMMON_OPTS="-DnvdApiKey=${{ secrets.NVD_API_KEY }} \
          -DfailBuildOnCVSS=7 \
          -Dformat=HTML \
          -DdataDirectory=$HOME/.dependency-check/data \
          -DassemblyAnalyzerEnabled=false \
          -DnodeAnalyzerEnabled=false \
          -DyarnAuditAnalyzerEnabled=false"
        mvn org.owasp:dependency-check-maven:check $COMMON_OPTS \
          -DoutputDirectory=${{ github.workspace }}/reports/webapp \
          -f WebApp/pom.xml
        mvn org.owasp:dependency-check-maven:check $COMMON_OPTS \
          -DoutputDirectory=${{ github.workspace }}/reports/serviceapp \
          -f ServiceApp/pom.xml


  

    # ----------------------------
    # 5. Security Gate
    # ----------------------------
    - name: Security Gate
      run: |
        if [ -f reports/dependency-check-report.html ]; then
          if grep -q "CRITICAL" reports/dependency-check-report.html; then
            echo "CRITICAL vulnerabilities found"
            exit 1
          else
            echo "No CRITICAL vulnerabilities"
          fi
        else
          echo "OWASP report not found"
          exit 1
        fi

    # ----------------------------
    # 6. Upload Artifacts (v4)
    # ----------------------------
    - name: Upload JARs
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          WebApp/target/*.jar
          ServiceApp/target/*.jar

  deploy:
    needs: build-and-scan
    runs-on: ubuntu-latest

    steps:
    # ----------------------------
    # 7. Download Artifacts
    # ----------------------------
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    # ----------------------------
    # 8. Copy to Bastion
    # ----------------------------
    - name: Copy to Bastion
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ubuntu
        key: ${{ secrets.BASTION_SSH_KEY }}
        source: "*.jar"
        target: "/home/ubuntu/"

    # ----------------------------
    # 9. Deploy via Bastion
    # ----------------------------
    - name: Deploy to Private Instances
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ubuntu
        key: ${{ secrets.BASTION_SSH_KEY }}
        script: |

          echo "Deploying WebApp-1"
          scp -i ~/key.pem webapp*.jar ubuntu@${{ secrets.WEBAPP1_IP }}:/home/ubuntu/webapp.jar

          echo "Deploying WebApp-2"
          scp -i ~/key.pem webapp*.jar ubuntu@${{ secrets.WEBAPP2_IP }}:/home/ubuntu/webapp.jar

          echo "Deploying ServiceApp"
          scp -i ~/key.pem serviceapp*.jar ubuntu@${{ secrets.SERVICEAPP_IP }}:/home/ubuntu/serviceapp.jar

          echo "Restarting Services"

          ssh -i ~/key.pem ubuntu@${{ secrets.WEBAPP1_IP }} "sudo systemctl restart webapp"
          ssh -i ~/key.pem ubuntu@${{ secrets.WEBAPP2_IP }} "sudo systemctl restart webapp"
          ssh -i ~/key.pem ubuntu@${{ secrets.SERVICEAPP_IP }} "sudo systemctl restart serviceapp"

          echo "✅ Deployment Completed"