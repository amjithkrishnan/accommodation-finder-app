name: Build and Deploy

on:
  push:
    branches:
      - master

env:
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository

jobs:
  build_serviceapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build ServiceApp
        run: |
          cd ServiceApp
          mvn -U clean package -DskipTests -e

      - name: Upload ServiceApp artifact
        uses: actions/upload-artifact@v4
        with:
          name: serviceapp-jar
          path: ServiceApp/target/serviceapp.jar

  build_webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build WebApp
        run: |
          cd WebApp
          mvn -U clean package -DskipTests -e

      - name: Upload WebApp artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-jar
          path: WebApp/target/webapp.jar

  deploy:
    runs-on: ubuntu-latest
    needs: [build_serviceapp, build_webapp]
    steps:
      - name: Download ServiceApp artifact
        uses: actions/download-artifact@v4
        with:
          name: serviceapp-jar
          path: ServiceApp/target

      - name: Download WebApp artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-jar
          path: WebApp/target

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy JARs to EC2
        run: |
          scp ServiceApp/target/serviceapp.jar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/serviceapp/serviceapp.jar
          scp WebApp/target/webapp.jar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/webapp/webapp.jar

      - name: Write ServiceApp env file
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cat > /opt/serviceapp/.env <<EOF
          SPRING_PROFILES_ACTIVE=prod
          DB_URL=${{ secrets.DB_URL }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_DRIVER=${{ secrets.DB_DRIVER }}
          DDL_AUTO=${{ secrets.DDL_AUTO }}
          SHOW_SQL=${{ secrets.SHOW_SQL }}
          HIBERNATE_DIALECT=${{ secrets.HIBERNATE_DIALECT }}
          SESSION_TIMEOUT=${{ secrets.SESSION_TIMEOUT }}
          COOKIE_MAX_AGE=${{ secrets.COOKIE_MAX_AGE }}
          COOKIE_DOMAIN=${{ secrets.COOKIE_DOMAIN }}
          COOKIE_SECURE=${{ secrets.COOKIE_SECURE }}
          MAX_FILE_SIZE=${{ secrets.MAX_FILE_SIZE }}
          MAX_REQUEST_SIZE=${{ secrets.MAX_REQUEST_SIZE }}
          STORAGE_MODE=${{ secrets.STORAGE_MODE }}
          S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EOF"

      - name: Write WebApp env file
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cat > /opt/webapp/.env <<EOF
          SPRING_PROFILES_ACTIVE=prod
          SERVICE_APP_URL=${{ secrets.SERVICE_APP_URL }}
          INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}
          EOF"

      - name: Restart services
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo systemctl restart serviceapp"
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo systemctl restart webapp"
