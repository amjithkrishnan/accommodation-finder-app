name: CI-CD Pipeline (Fast OWASP Mode)

on:
  push:
    branches:
      - master

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------
    # 1. Checkout Code
    # ----------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # ----------------------------
    # 2. Setup Java 21
    # ----------------------------
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21
        cache: maven

    # ----------------------------
    # 3. Build Project
    # ----------------------------
    - name: Build WebApp & ServiceApp
      run: |
        mvn -v
        cd WebApp && mvn clean package -DskipTests
        cd ../ServiceApp && mvn clean package -DskipTests

    # ----------------------------
    # 4. OWASP FAST MODE (Cached + API KEY)
    # ----------------------------
    - name: OWASP Dependency Check (Final Stable Mode)
      run: |
        mkdir -p reports

        docker run --rm \
        -v ${{ github.workspace }}:/src \
        owasp/dependency-check:12.1.0 \
        --scan /src \
        --format HTML \
        --out /src/reports \
        --disableYarnAudit \
        --disableNodeAudit \
        --failOnCVSS 7 \
        --update false


  

    # ----------------------------
    # 5. Security Gate
    # ----------------------------
    - name: Security Gate
      run: |
        if [ -f reports/dependency-check-report.html ]; then
          if grep -q "CRITICAL" reports/dependency-check-report.html; then
            echo "CRITICAL vulnerabilities found"
            exit 1
          else
            echo "No CRITICAL vulnerabilities"
          fi
        else
          echo "OWASP report not found"
          exit 1
        fi

    # ----------------------------
    # 6. Upload Artifacts (v4)
    # ----------------------------
    - name: Upload JARs
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          WebApp/target/*.jar
          ServiceApp/target/*.jar

  deploy:
    needs: build-and-scan
    runs-on: ubuntu-latest

    steps:
    # ----------------------------
    # 7. Download Artifacts
    # ----------------------------
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    # ----------------------------
    # 8. Copy to Bastion
    # ----------------------------
    - name: Copy to Bastion
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ubuntu
        key: ${{ secrets.BASTION_SSH_KEY }}
        source: "*.jar"
        target: "/home/ubuntu/"

    # ----------------------------
    # 9. Deploy via Bastion
    # ----------------------------
    - name: Deploy to Private Instances
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ubuntu
        key: ${{ secrets.BASTION_SSH_KEY }}
        script: |

          echo "Deploying WebApp-1"
          scp -i ~/key.pem webapp*.jar ubuntu@${{ secrets.WEBAPP1_IP }}:/home/ubuntu/webapp.jar

          echo "Deploying WebApp-2"
          scp -i ~/key.pem webapp*.jar ubuntu@${{ secrets.WEBAPP2_IP }}:/home/ubuntu/webapp.jar

          echo "Deploying ServiceApp"
          scp -i ~/key.pem serviceapp*.jar ubuntu@${{ secrets.SERVICEAPP_IP }}:/home/ubuntu/serviceapp.jar

          echo "Restarting Services"

          ssh -i ~/key.pem ubuntu@${{ secrets.WEBAPP1_IP }} "sudo systemctl restart webapp"
          ssh -i ~/key.pem ubuntu@${{ secrets.WEBAPP2_IP }} "sudo systemctl restart webapp"
          ssh -i ~/key.pem ubuntu@${{ secrets.SERVICEAPP_IP }} "sudo systemctl restart serviceapp"

          echo "✅ Deployment Completed"